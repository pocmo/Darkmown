<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkmown</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292f;
            --code-bg: #f6f8fa;
            --code-text: #24292f;
            --border-color: #d0d7de;
            --blockquote-color: #656d76;
            --blockquote-border: #d0d7de;
            --link-color: #0969da;
            --table-border: #d0d7de;
            --table-alt-bg: #f6f8fa;
            --hr-color: #d8dee4;
            --heading-color: #1f2328;
            --search-highlight-bg: rgba(255, 200, 0, 0.4);
            --search-highlight-active-bg: rgba(255, 150, 0, 0.6);
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --text-color: #e6edf3;
            --code-bg: #2d2d2d;
            --code-text: #e6edf3;
            --border-color: #444c56;
            --blockquote-color: #8b949e;
            --blockquote-border: #444c56;
            --link-color: #58a6ff;
            --table-border: #444c56;
            --table-alt-bg: #262626;
            --hr-color: #444c56;
            --heading-color: #f0f6fc;
            --search-highlight-bg: rgba(255, 200, 0, 0.35);
            --search-highlight-active-bg: rgba(255, 150, 0, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            -webkit-font-smoothing: antialiased;
        }

        #content {
            transition: color 0.3s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
            transition: color 0.3s ease;
            scroll-margin-top: 16px;
        }

        h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }
        h5 { font-size: 0.875em; }
        h6 { font-size: 0.85em; color: var(--blockquote-color); }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.875em;
            background-color: var(--code-bg);
            color: var(--code-text);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        pre {
            background-color: var(--code-bg);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 1em;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        blockquote {
            margin: 0 0 1em 0;
            padding: 0.5em 1em;
            color: var(--blockquote-color);
            border-left: 4px solid var(--blockquote-border);
            background: transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        blockquote p:last-child {
            margin-bottom: 0;
        }

        ul, ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        li {
            margin-bottom: 0.25em;
        }

        li > ul, li > ol {
            margin-bottom: 0;
            margin-top: 0.25em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            overflow: auto;
        }

        th, td {
            padding: 8px 16px;
            border: 1px solid var(--table-border);
            text-align: left;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        th {
            font-weight: 600;
            background-color: var(--code-bg);
        }

        tr:nth-child(even) {
            background-color: var(--table-alt-bg);
        }

        hr {
            border: none;
            height: 2px;
            background-color: var(--hr-color);
            margin: 2em 0;
            transition: background-color 0.3s ease;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .task-list-item {
            list-style-type: none;
            margin-left: -1.5em;
        }

        .task-list-item input[type="checkbox"] {
            margin-right: 0.5em;
        }

        .mermaid {
            text-align: center;
            margin: 1em 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .mermaid:hover {
            background-color: var(--code-bg);
        }

        .mermaid-click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* Mermaid lightbox */
        .mermaid-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .mermaid-lightbox.visible {
            opacity: 1;
        }

        .mermaid-lightbox-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .mermaid-lightbox-content {
            position: relative;
            overflow: hidden;
            cursor: grab;
            width: 90vw;
            height: 90vh;
            border-radius: 12px;
            background: var(--bg-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mermaid-lightbox-content:active {
            cursor: grabbing;
        }

        .mermaid-lightbox-content svg {
            display: block;
            transform-origin: 0 0;
        }

        .mermaid-lightbox-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--blockquote-color);
            background: var(--code-bg);
            padding: 4px 12px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Search highlight styles */
        .search-highlight {
            background-color: var(--search-highlight-bg);
            border-radius: 2px;
        }

        .search-highlight-active {
            background-color: var(--search-highlight-active-bg);
            border-radius: 2px;
            outline: 2px solid var(--search-highlight-active-bg);
        }

        /* Print styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
                max-width: none;
                padding: 20px;
            }
            .search-highlight, .search-highlight-active {
                background: none !important;
                outline: none !important;
            }
            .mermaid-lightbox {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        // Configure marked for GFM
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        // Configure mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose'
        });

        // Slugify helper - converts heading text to a URL-friendly id
        function slugify(text) {
            return text
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // Custom renderer for mermaid code blocks and heading ids
        const renderer = new marked.Renderer();
        const originalCodeRenderer = renderer.code.bind(renderer);

        // Track heading slugs to handle duplicates
        let headingSlugCounts = {};

        renderer.heading = function(text, level) {
            // Handle both old API (text, level) and new API ({text, depth})
            let headingText, headingLevel;
            if (typeof text === 'object') {
                headingText = text.text;
                headingLevel = text.depth;
            } else {
                headingText = text;
                headingLevel = level;
            }

            // Strip HTML tags for the slug
            const plainText = headingText.replace(/<[^>]*>/g, '');
            const slug = slugify(plainText);

            // Handle duplicate slugs
            const key = plainText.hashCode ? plainText.hashCode() : simpleHash(plainText);
            if (headingSlugCounts[key] === undefined) {
                headingSlugCounts[key] = 0;
            }
            const count = headingSlugCounts[key];
            headingSlugCounts[key] = count + 1;

            const id = count === 0 ? slug : slug + '-' + count;

            return '<h' + headingLevel + ' id="' + id + '">' + headingText + '</h' + headingLevel + '>';
        };

        // Simple hash function for strings (mirrors Swift's String.hashValue behavior for dedup)
        function simpleHash(str) {
            var hash = 0;
            for (var i = 0; i < str.length; i++) {
                var char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return hash;
        }

        renderer.code = function(code, language) {
            // Handle both old API (code, language) and new API ({text, lang})
            let text, lang;
            if (typeof code === 'object') {
                text = code.text;
                lang = code.lang;
            } else {
                text = code;
                lang = language;
            }

            if (lang === 'mermaid') {
                return '<div class="mermaid">' + text + '</div>';
            }
            // Use default rendering
            if (typeof arguments[0] === 'object') {
                return originalCodeRenderer(arguments[0]);
            }
            return originalCodeRenderer(text, lang);
        };

        marked.use({ renderer: renderer });

        let mermaidCounter = 0;

        function renderMarkdown(text, isDark) {
            // Reset heading slug counts for each render
            headingSlugCounts = {};

            // Set theme
            const root = document.documentElement;
            root.setAttribute('data-theme', isDark ? 'dark' : 'light');

            // Toggle highlight.js themes
            document.getElementById('hljs-light').disabled = isDark;
            document.getElementById('hljs-dark').disabled = !isDark;

            // Update mermaid theme
            mermaid.initialize({
                startOnLoad: false,
                theme: isDark ? 'dark' : 'default',
                securityLevel: 'loose'
            });

            // Render markdown
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = marked.parse(text || '');

            // Apply syntax highlighting
            document.querySelectorAll('pre code').forEach(function(block) {
                hljs.highlightElement(block);
            });

            // Render mermaid diagrams
            const mermaidDivs = document.querySelectorAll('.mermaid');
            mermaidDivs.forEach(function(div) {
                const graphDef = div.textContent;
                const id = 'mermaid-' + (mermaidCounter++);
                try {
                    mermaid.render(id, graphDef).then(function(result) {
                        div.innerHTML = result.svg;
                        attachMermaidClickHandler(div);
                    }).catch(function(err) {
                        console.error('Mermaid render error:', err);
                    });
                } catch (err) {
                    console.error('Mermaid error:', err);
                }
            });
        }

        // Smoothly scrolls to a heading by its id attribute
        function scrollToHeading(id) {
            var el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // ---- Search functionality ----
        var searchState = {
            highlights: [],
            currentIndex: -1,
            query: ''
        };

        function clearSearchHighlights() {
            searchState.highlights.forEach(function(span) {
                var parent = span.parentNode;
                if (parent) {
                    parent.replaceChild(document.createTextNode(span.textContent), span);
                    parent.normalize();
                }
            });
            searchState.highlights = [];
            searchState.currentIndex = -1;
            searchState.query = '';
        }

        function highlightTextNodes(node, query) {
            if (node.nodeType === Node.TEXT_NODE) {
                var text = node.textContent;
                var lowerText = text.toLowerCase();
                var lowerQuery = query.toLowerCase();
                var idx = lowerText.indexOf(lowerQuery);
                if (idx === -1) return;

                var parts = [];
                var lastIdx = 0;
                while (idx !== -1) {
                    if (idx > lastIdx) {
                        parts.push(document.createTextNode(text.substring(lastIdx, idx)));
                    }
                    var span = document.createElement('span');
                    span.className = 'search-highlight';
                    span.textContent = text.substring(idx, idx + query.length);
                    parts.push(span);
                    searchState.highlights.push(span);
                    lastIdx = idx + query.length;
                    idx = lowerText.indexOf(lowerQuery, lastIdx);
                }
                if (lastIdx < text.length) {
                    parts.push(document.createTextNode(text.substring(lastIdx)));
                }

                var parent = node.parentNode;
                for (var i = 0; i < parts.length; i++) {
                    parent.insertBefore(parts[i], node);
                }
                parent.removeChild(node);
            } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                // Collect child nodes into array first to avoid live NodeList issues
                var children = Array.prototype.slice.call(node.childNodes);
                for (var i = 0; i < children.length; i++) {
                    highlightTextNodes(children[i], query);
                }
            }
        }

        function performSearch(query) {
            clearSearchHighlights();
            if (!query || query.length === 0) {
                return JSON.stringify({ total: 0, current: 0 });
            }
            searchState.query = query;
            var contentEl = document.getElementById('content');
            highlightTextNodes(contentEl, query);

            if (searchState.highlights.length > 0) {
                searchState.currentIndex = 0;
                searchState.highlights[0].className = 'search-highlight-active';
                searchState.highlights[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            return JSON.stringify({
                total: searchState.highlights.length,
                current: searchState.highlights.length > 0 ? 1 : 0
            });
        }

        function searchNext() {
            if (searchState.highlights.length === 0) {
                return JSON.stringify({ total: 0, current: 0 });
            }
            // Remove active from current
            searchState.highlights[searchState.currentIndex].className = 'search-highlight';
            // Move to next (wrap around)
            searchState.currentIndex = (searchState.currentIndex + 1) % searchState.highlights.length;
            searchState.highlights[searchState.currentIndex].className = 'search-highlight-active';
            searchState.highlights[searchState.currentIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return JSON.stringify({
                total: searchState.highlights.length,
                current: searchState.currentIndex + 1
            });
        }

        function searchPrevious() {
            if (searchState.highlights.length === 0) {
                return JSON.stringify({ total: 0, current: 0 });
            }
            searchState.highlights[searchState.currentIndex].className = 'search-highlight';
            searchState.currentIndex = (searchState.currentIndex - 1 + searchState.highlights.length) % searchState.highlights.length;
            searchState.highlights[searchState.currentIndex].className = 'search-highlight-active';
            searchState.highlights[searchState.currentIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return JSON.stringify({
                total: searchState.highlights.length,
                current: searchState.currentIndex + 1
            });
        }

        function clearSearch() {
            clearSearchHighlights();
            return JSON.stringify({ total: 0, current: 0 });
        }

        // ---- Zoom functionality ----
        var currentZoom = 1.0;

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.1, 3.0);
            document.body.style.zoom = currentZoom;
            return currentZoom;
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.1, 0.5);
            document.body.style.zoom = currentZoom;
            return currentZoom;
        }

        function zoomReset() {
            currentZoom = 1.0;
            document.body.style.zoom = currentZoom;
            return currentZoom;
        }

        // ---- Scroll functionality ----
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // ---- Mermaid lightbox ----
        var lightbox = {
            el: null,
            content: null,
            scale: 1,
            panX: 0,
            panY: 0,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            panStartX: 0,
            panStartY: 0,
            svgEl: null
        };

        function createLightbox() {
            if (lightbox.el) return;
            var el = document.createElement('div');
            el.className = 'mermaid-lightbox';
            el.innerHTML = '<div class="mermaid-lightbox-backdrop"></div>' +
                '<div class="mermaid-lightbox-content"></div>' +
                '<div class="mermaid-lightbox-hint">Scroll to zoom · Drag to pan · Esc to close</div>';
            document.body.appendChild(el);
            lightbox.el = el;
            lightbox.content = el.querySelector('.mermaid-lightbox-content');

            el.querySelector('.mermaid-lightbox-backdrop').addEventListener('click', closeLightbox);

            lightbox.content.addEventListener('wheel', function(e) {
                e.preventDefault();
                var factor = 1 - e.deltaY * 0.002;
                lightbox.scale = Math.min(Math.max(lightbox.scale * factor, 0.3), 5);
                applyLightboxTransform();
            }, { passive: false });

            lightbox.content.addEventListener('mousedown', function(e) {
                e.preventDefault();
                lightbox.dragging = true;
                lightbox.dragStartX = e.clientX;
                lightbox.dragStartY = e.clientY;
                lightbox.panStartX = lightbox.panX;
                lightbox.panStartY = lightbox.panY;
            });

            document.addEventListener('mousemove', function(e) {
                if (!lightbox.dragging) return;
                lightbox.panX = lightbox.panStartX + (e.clientX - lightbox.dragStartX);
                lightbox.panY = lightbox.panStartY + (e.clientY - lightbox.dragStartY);
                applyLightboxTransform();
            });

            document.addEventListener('mouseup', function() {
                lightbox.dragging = false;
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.el && lightbox.el.classList.contains('visible')) {
                    closeLightbox();
                }
            });
        }

        function applyLightboxTransform() {
            if (!lightbox.svgEl) return;
            lightbox.svgEl.style.transform = 'translate(' + lightbox.panX + 'px, ' + lightbox.panY + 'px) scale(' + lightbox.scale + ')';
        }

        function openLightbox(mermaidDiv) {
            createLightbox();
            var svg = mermaidDiv.querySelector('svg');
            if (!svg) return;

            lightbox.scale = 1;
            lightbox.panX = 0;
            lightbox.panY = 0;
            lightbox.sourceDiv = mermaidDiv;

            // Move the original SVG into the lightbox
            lightbox.content.innerHTML = '';
            lightbox.content.appendChild(svg);
            svg.style.maxWidth = '90vw';
            svg.style.maxHeight = '85vh';
            svg.style.transformOrigin = '50% 50%';
            lightbox.svgEl = svg;

            document.body.style.overflow = 'hidden';
            lightbox.el.style.display = 'flex';
            requestAnimationFrame(function() {
                lightbox.el.classList.add('visible');
            });
        }

        function closeLightbox() {
            if (!lightbox.el) return;
            lightbox.el.classList.remove('visible');
            document.body.style.overflow = '';
            setTimeout(function() {
                lightbox.el.style.display = 'none';
                // Return the SVG to its original mermaid div
                if (lightbox.svgEl && lightbox.sourceDiv) {
                    lightbox.svgEl.style.maxWidth = '';
                    lightbox.svgEl.style.maxHeight = '';
                    lightbox.svgEl.style.transformOrigin = '';
                    lightbox.svgEl.style.transform = '';
                    // Insert before the overlay
                    var overlay = lightbox.sourceDiv.querySelector('.mermaid-click-overlay');
                    if (overlay) {
                        lightbox.sourceDiv.insertBefore(lightbox.svgEl, overlay);
                    } else {
                        lightbox.sourceDiv.appendChild(lightbox.svgEl);
                    }
                }
                lightbox.content.innerHTML = '';
                lightbox.svgEl = null;
                lightbox.sourceDiv = null;
            }, 200);
        }

        function attachMermaidClickHandler(div) {
            if (div.dataset.lightboxAttached) return;
            div.dataset.lightboxAttached = 'true';
            var overlay = document.createElement('div');
            overlay.className = 'mermaid-click-overlay';
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                openLightbox(div);
            });
            div.appendChild(overlay);
        }
    </script>
</body>
</html>
