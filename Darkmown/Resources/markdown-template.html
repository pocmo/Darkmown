<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkmown</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@latest/build/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292f;
            --code-bg: #f6f8fa;
            --code-text: #24292f;
            --border-color: #d0d7de;
            --blockquote-color: #656d76;
            --blockquote-border: #d0d7de;
            --link-color: #0969da;
            --table-border: #d0d7de;
            --table-alt-bg: #f6f8fa;
            --hr-color: #d8dee4;
            --heading-color: #1f2328;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --text-color: #e6edf3;
            --code-bg: #2d2d2d;
            --code-text: #e6edf3;
            --border-color: #444c56;
            --blockquote-color: #8b949e;
            --blockquote-border: #444c56;
            --link-color: #58a6ff;
            --table-border: #444c56;
            --table-alt-bg: #262626;
            --hr-color: #444c56;
            --heading-color: #f0f6fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            -webkit-font-smoothing: antialiased;
        }

        #content {
            transition: color 0.3s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
            transition: color 0.3s ease;
        }

        h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }
        h5 { font-size: 0.875em; }
        h6 { font-size: 0.85em; color: var(--blockquote-color); }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.875em;
            background-color: var(--code-bg);
            color: var(--code-text);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        pre {
            background-color: var(--code-bg);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 1em;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        blockquote {
            margin: 0 0 1em 0;
            padding: 0.5em 1em;
            color: var(--blockquote-color);
            border-left: 4px solid var(--blockquote-border);
            background: transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        blockquote p:last-child {
            margin-bottom: 0;
        }

        ul, ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        li {
            margin-bottom: 0.25em;
        }

        li > ul, li > ol {
            margin-bottom: 0;
            margin-top: 0.25em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            overflow: auto;
        }

        th, td {
            padding: 8px 16px;
            border: 1px solid var(--table-border);
            text-align: left;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        th {
            font-weight: 600;
            background-color: var(--code-bg);
        }

        tr:nth-child(even) {
            background-color: var(--table-alt-bg);
        }

        hr {
            border: none;
            height: 2px;
            background-color: var(--hr-color);
            margin: 2em 0;
            transition: background-color 0.3s ease;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .task-list-item {
            list-style-type: none;
            margin-left: -1.5em;
        }

        .task-list-item input[type="checkbox"] {
            margin-right: 0.5em;
        }

        .mermaid {
            text-align: center;
            margin: 1em 0;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        // Configure marked for GFM
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        // Configure mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose'
        });

        // Custom renderer for mermaid code blocks
        const renderer = new marked.Renderer();
        const originalCodeRenderer = renderer.code.bind(renderer);

        renderer.code = function(code, language) {
            // Handle both old API (code, language) and new API ({text, lang})
            let text, lang;
            if (typeof code === 'object') {
                text = code.text;
                lang = code.lang;
            } else {
                text = code;
                lang = language;
            }

            if (lang === 'mermaid') {
                return '<div class="mermaid">' + text + '</div>';
            }
            // Use default rendering
            if (typeof arguments[0] === 'object') {
                return originalCodeRenderer(arguments[0]);
            }
            return originalCodeRenderer(text, lang);
        };

        marked.use({ renderer: renderer });

        let mermaidCounter = 0;

        function renderMarkdown(text, isDark) {
            // Set theme
            const root = document.documentElement;
            root.setAttribute('data-theme', isDark ? 'dark' : 'light');

            // Toggle highlight.js themes
            document.getElementById('hljs-light').disabled = isDark;
            document.getElementById('hljs-dark').disabled = !isDark;

            // Update mermaid theme
            mermaid.initialize({
                startOnLoad: false,
                theme: isDark ? 'dark' : 'default',
                securityLevel: 'loose'
            });

            // Render markdown
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = marked.parse(text || '');

            // Apply syntax highlighting
            document.querySelectorAll('pre code').forEach(function(block) {
                hljs.highlightElement(block);
            });

            // Render mermaid diagrams
            const mermaidDivs = document.querySelectorAll('.mermaid');
            mermaidDivs.forEach(function(div) {
                const graphDef = div.textContent;
                const id = 'mermaid-' + (mermaidCounter++);
                try {
                    mermaid.render(id, graphDef).then(function(result) {
                        div.innerHTML = result.svg;
                    }).catch(function(err) {
                        console.error('Mermaid render error:', err);
                    });
                } catch (err) {
                    console.error('Mermaid error:', err);
                }
            });
        }
    </script>
</body>
</html>
